<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave Dashboard System (Pastel Theme)</title>
  
  <!-- เพิ่มฟอนต์ Prompt จาก Google Fonts ให้ตัวหนังสือชัดเจนขึ้น -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- 1. ดึง Tailwind CSS มาใช้จัดหน้าตา -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- ตั้งค่าให้ระบบเปลี่ยนมาใช้ฟอนต์ Prompt -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Prompt', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- 2. ดึงไอคอนจาก FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 3. ดึง React มาใช้งาน -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  
  <!-- 4. ดึง Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 5. ดึง Recharts -->
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>

  <style>
    /* ปรับแต่ง Scrollbar สำหรับ Pastel Theme */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #F5F2EA; border-radius: 4px; } 
    ::-webkit-scrollbar-thumb { background: #D3C8B4; border-radius: 4px; } 
    ::-webkit-scrollbar-thumb:hover { background: #8C8476; } 

    /* ซ่อน Scrollbar สำหรับปฏิทิน */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ปรับแต่งฟอนต์ให้ชัดเจน */
    body { font-family: 'Prompt', sans-serif; }
  </style>
</head>
<body class="bg-[#F5F2EA] text-[#4A4238] selection:bg-[#D3E4CD] selection:text-[#3A4D39]">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, PieChart, Pie, Cell, ResponsiveContainer } = window.Recharts;

    // --- MOCK DATA ---
    const mockEmployees = [
      { id: 'U1', name: 'ไชยสิทธิ์ อึ้งใจธรรม', nickname: 'พี', department: 'AVT', status: 'Active' },
      { id: 'U2', name: 'กนกอร จรทะผา', nickname: 'มี่', department: 'BDI', status: 'Active' },
      { id: 'U3', name: 'Pornphan Kemchalerm', nickname: 'Tangkwa', department: 'AVT', status: 'Active' },
      { id: 'U4', name: 'NamNuenG', nickname: 'NamNuenG', department: 'MKT', status: 'Active' },
      { id: 'U5', name: 'NN_NUCH', nickname: 'Nuch', department: 'HR', status: 'Active' },
    ];

    const mockBalances = [
      { userId: 'U1', type: 'Annual', entitled: 6, used: 1, remaining: 5 },
      { userId: 'U1', type: 'Sick', entitled: 30, used: 2, remaining: 28 },
      { userId: 'U1', type: 'Personal', entitled: 5, used: 0, remaining: 5 },
      { userId: 'U2', type: 'Annual', entitled: 6, used: 2, remaining: 4 },
      { userId: 'U2', type: 'Sick', entitled: 30, used: 0, remaining: 30 },
      { userId: 'U2', type: 'Personal', entitled: 5, used: 1, remaining: 4 },
      { userId: 'U3', type: 'Annual', entitled: 6, used: 4, remaining: 2 },
      { userId: 'U4', type: 'Sick', entitled: 30, used: 5, remaining: 25 },
      { userId: 'U5', type: 'Personal', entitled: 5, used: 5, remaining: 0 },
    ];

    const mockRequests = [
      { id: 'REQ-001', userId: 'U4', name: 'NamNuenG', type: 'Sick', startDate: '2026-03-09', endDate: '2026-03-09', days: 0.5, reason: 'ปวดท้อง', status: 'APPROVED', submitDate: '2026-03-09' },
      { id: 'REQ-002', userId: 'U5', name: 'NN_NUCH', type: 'Personal', startDate: '2026-03-12', endDate: '2026-03-12', days: 0.5, reason: 'ไปธุระส่วนตัว', status: 'APPROVED', submitDate: '2026-03-10' },
      { id: 'REQ-003', userId: 'U1', name: 'ไชยสิทธิ์', type: 'Annual', startDate: '2026-03-20', endDate: '2026-03-20', days: 1, reason: 'ทำธุระที่ธนาคาร', status: 'PENDING', submitDate: '2026-03-11' },
      { id: 'REQ-004', userId: 'U2', name: 'กนกอร', type: 'Sick', startDate: '2026-03-11', endDate: '2026-03-11', days: 1, reason: 'ไข้หวัด', status: 'PENDING', submitDate: '2026-03-11' },
      { id: 'REQ-005', userId: 'U3', name: 'Pornphan', type: 'Annual', startDate: '2026-02-15', endDate: '2026-02-16', days: 2, reason: 'เที่ยวต่างจังหวัด', status: 'REJECTED', submitDate: '2026-02-01' },
      { id: 'REQ-006', userId: 'U1', name: 'ไชยสิทธิ์', type: 'Annual', startDate: '2026-04-10', endDate: '2026-04-12', days: 3, reason: 'พักผ่อนสงกรานต์', status: 'APPROVED', submitDate: '2026-03-05' },
    ];

    const mockHolidays = [
      { date: '2026-01-01', name: 'วันปีใหม่' },
      { date: '2026-03-03', name: 'วันมาฆบูชา' },
      { date: '2026-04-06', name: 'วันจักรี' },
      { date: '2026-04-13', name: 'วันสงกรานต์' },
      { date: '2026-04-14', name: 'วันสงกรานต์' },
      { date: '2026-04-15', name: 'วันสงกรานต์' },
      { date: '2026-05-01', name: 'วันแรงงาน' },
    ];

    // โทนสี Pastel ที่ปรับให้ชัดเจนขึ้น
    const COLORS = { Annual: '#7EB1E0', Sick: '#F58D85', Personal: '#F8C48B', Other: '#C5B1D4', Holiday: '#86D1B3' };
    const STATUS_COLORS = { 
      PENDING: 'bg-[#FFDAC1] text-[#9C4221] border-[#E8C59A]', 
      APPROVED: 'bg-[#A8E6CF] text-[#22543D] border-[#9AE6B4]', 
      REJECTED: 'bg-[#FFB7B2] text-[#9B2C2C] border-[#E0B9BC]' 
    };

    // --- COMPONENTS ---
    function NavItem({ icon, label, active, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full flex items-center px-5 py-3.5 text-sm font-bold rounded-2xl transition-all ${
            active ? 'bg-[#F5F2EA] text-[#4A4238] shadow-sm' : 'text-[#8C8476] hover:bg-[#F5F2EA]/50 hover:text-[#4A4238]'
          }`}
        >
          <span className={`mr-4 w-5 h-5 flex items-center justify-center ${active ? 'text-[#8C8476]' : 'text-[#D3C8B4]'}`}>
            {icon}
          </span>
          {label}
        </button>
      );
    }

    function StatCard({ title, value, subtitle, icon, bgColor, textColor, onClick }) {
      return (
        <div 
          onClick={onClick}
          className={`bg-white p-6 rounded-3xl shadow-sm border border-[#EBE6DD] transition-all ${onClick ? 'cursor-pointer hover:shadow-md hover:-translate-y-1' : ''}`}
        >
          <div className="flex items-center justify-between">
            <div>
              <p className="text-sm font-bold text-[#8C8476] mb-1">{title}</p>
              <p className="text-3xl font-black text-[#4A4238]">{value}</p>
              {subtitle && <p className="text-xs font-semibold text-[#D3C8B4] mt-1">{subtitle}</p>}
            </div>
            <div className={`p-4 rounded-2xl flex items-center justify-center w-14 h-14 ${bgColor} ${textColor} shadow-sm`}>
              {icon}
            </div>
          </div>
        </div>
      );
    }

    // --- TABS ---
    function OverviewTab({ stats, onNavigate }) {
      const [chartUser, setChartUser] = useState('ALL');

      const pieData = [
        { name: 'ลาพักร้อน', value: 35, fill: COLORS.Annual },
        { name: 'ลาป่วย', value: 45, fill: COLORS.Sick },
        { name: 'ลากิจ', value: 15, fill: COLORS.Personal },
        { name: 'อื่นๆ', value: 5, fill: COLORS.Other }
      ];
      
      const dynamicBarData = useMemo(() => {
        const monthlyDays = Array(12).fill(0);
        const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

        const filteredReqs = mockRequests.filter(req => 
          req.status === 'APPROVED' && 
          req.startDate.startsWith('2026') &&
          (chartUser === 'ALL' || req.userId === chartUser)
        );

        filteredReqs.forEach(req => {
          const monthIdx = parseInt(req.startDate.split('-')[1], 10) - 1;
          if (monthIdx >= 0 && monthIdx < 12) {
            monthlyDays[monthIdx] += req.days;
          }
        });

        return months.map((m, i) => ({ name: m, days: monthlyDays[i] }));
      }, [chartUser]);

      const thisMonthLeaves = mockRequests.filter(req => req.startDate.startsWith('2026-03') && req.status === 'APPROVED');
      const upcomingHolidays = mockHolidays.filter(h => h.date >= '2026-03-01').slice(0, 4);

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
            <StatCard 
              title="กำลังลาวันนี้" value={stats.onLeaveToday} subtitle="คลิกเพื่อดูรายละเอียด"
              icon={<i className="fa-solid fa-users text-xl"></i>} bgColor="bg-[#86D1B3]/20" textColor="text-[#22543D]" onClick={() => onNavigate('onLeave')}
            />
            <StatCard 
              title="รออนุมัติ" value={stats.pending} subtitle="รายการคำขอใหม่"
              icon={<i className="fa-solid fa-clock text-xl"></i>} bgColor="bg-[#F8C48B]/20" textColor="text-[#9C4221]"
            />
            <StatCard 
              title="วันลาเฉลี่ย/คน" value={`${stats.avgDays} วัน`} subtitle="ตั้งแต่ต้นปี"
              icon={<i className="fa-solid fa-chart-simple text-xl"></i>} bgColor="bg-[#7EB1E0]/20" textColor="text-[#2C5282]"
            />
            <StatCard 
              title="ลาบ่อยสุด" value={stats.mostFrequent} subtitle="ประเภทลาหลัก"
              icon={<i className="fa-solid fa-file-lines text-xl"></i>} bgColor="bg-[#F58D85]/20" textColor="text-[#9B2C2C]"
            />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 space-y-6">
              <div className="bg-white p-6 rounded-3xl shadow-sm border border-[#EBE6DD]">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                  <h3 className="text-lg font-bold text-[#4A4238]">แนวโน้มการลาแต่ละเดือน</h3>
                  <div className="flex items-center space-x-2 bg-[#F5F2EA] rounded-full px-4 py-1.5 border border-[#EBE6DD]">
                    <i className="fa-solid fa-user text-[#8C8476] text-xs"></i>
                    <select 
                      className="text-sm font-semibold bg-transparent focus:outline-none text-[#4A4238] cursor-pointer"
                      value={chartUser}
                      onChange={(e) => setChartUser(e.target.value)}
                    >
                      <option value="ALL">พนักงานทั้งหมด (รวม)</option>
                      {mockEmployees.map(emp => (
                        <option key={emp.id} value={emp.id}>{emp.name}</option>
                      ))}
                    </select>
                  </div>
                </div>
                <div className="h-64">
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={dynamicBarData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                      <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#EBE6DD" />
                      <XAxis dataKey="name" tick={{ fontSize: 12, fill: '#8C8476', fontWeight: 'bold' }} axisLine={false} tickLine={false} />
                      <YAxis tick={{ fontSize: 12, fill: '#8C8476', fontWeight: 'bold' }} axisLine={false} tickLine={false} />
                      <RechartsTooltip cursor={{fill: '#F5F2EA'}} contentStyle={{ backgroundColor: '#FDFBF7', borderColor: '#EBE6DD', borderRadius: '16px' }} />
                      <Bar dataKey="days" fill="#4A4238" radius={[8, 8, 8, 8]} barSize={36} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>

              <div id="this-month-leave-table" className="bg-white p-6 rounded-3xl shadow-sm border border-[#EBE6DD]">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-lg font-bold text-[#4A4238]">พนักงานที่ลาในเดือนนี้</h3>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse">
                    <thead className="bg-[#F5F2EA] text-[#8C8476] text-xs uppercase">
                      <tr>
                        <th className="py-3 px-4 rounded-tl-xl">พนักงาน</th>
                        <th className="py-3 px-4">วันที่ลา</th>
                        <th className="py-3 px-4">ประเภท</th>
                        <th className="py-3 px-4 rounded-tr-xl">จำนวน</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-[#EBE6DD]">
                      {thisMonthLeaves.map(leave => (
                        <tr key={leave.id} className="hover:bg-[#FDFBF7]">
                          <td className="py-4 px-4 font-bold text-[#4A4238]">{leave.name}</td>
                          <td className="py-4 px-4 text-xs font-semibold text-[#8C8476]">{leave.startDate}</td>
                          <td className="py-4 px-4"><span className="text-xs font-bold" style={{color: COLORS[leave.type]}}>{leave.type}</span></td>
                          <td className="py-4 px-4 text-sm font-bold">{leave.days} วัน</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            <div className="space-y-6">
              <div className="bg-white p-6 rounded-3xl shadow-sm border border-[#EBE6DD]">
                <h3 className="text-lg font-bold text-[#4A4238] mb-6">สัดส่วนประเภทการลา</h3>
                <div className="h-56">
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie data={pieData} cx="50%" cy="50%" innerRadius={65} outerRadius={85} paddingAngle={6} stroke="none" dataKey="value">
                        {pieData.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.fill} />)}
                      </Pie>
                      <RechartsTooltip />
                    </PieChart>
                  </ResponsiveContainer>
                </div>
              </div>

              <div className="bg-white p-6 rounded-3xl shadow-sm border border-[#EBE6DD]">
                <h3 className="text-lg font-bold text-[#4A4238] mb-6">วันหยุดถัดไป</h3>
                <div className="space-y-4">
                  {upcomingHolidays.map((holiday, idx) => (
                    <div key={idx} className="flex items-center bg-[#FDFBF7] p-3 rounded-2xl border border-[#EBE6DD]">
                      <div className="w-12 h-12 bg-[#86D1B3]/20 text-[#22543D] rounded-xl flex flex-col items-center justify-center mr-4">
                        <span className="text-[10px] font-bold">{new Date(holiday.date).getDate()}</span>
                      </div>
                      <div className="flex-1">
                        <p className="text-sm font-bold text-[#4A4238]">{holiday.name}</p>
                        <p className="text-xs font-semibold text-[#8C8476]">{holiday.date}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function CalendarTab() {
      const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1)); 

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const startDayOfWeek = new Date(year, month, 1).getDay();

      const monthNames = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

      const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));

      const getEventsForDay = (day) => {
        const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
        const hols = mockHolidays.filter(h => h.date === dateStr);
        const leaves = mockRequests.filter(r => r.status === 'APPROVED' && r.startDate <= dateStr && r.endDate >= dateStr);
        return { hols, leaves };
      };

      return (
        <div className="bg-[#FDFBF7] rounded-[2rem] shadow-sm border border-[#EBE6DD] flex flex-col h-full overflow-hidden">
          <div className="px-6 py-5 border-b border-[#EBE6DD] flex justify-between items-center bg-[#FDFBF7]">
            <div className="flex items-center space-x-4">
              <button onClick={prevMonth} className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#F5F2EA]"><i className="fa-solid fa-chevron-left"></i></button>
              <h2 className="text-2xl font-black text-[#4A4238] w-48 text-center">{monthNames[month]} {year}</h2>
              <button onClick={nextMonth} className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#F5F2EA]"><i className="fa-solid fa-chevron-right"></i></button>
            </div>
            <div className="flex space-x-4 text-[10px] font-bold uppercase tracking-wider text-[#8C8476]">
              <span className="flex items-center"><span className="w-2 h-2 bg-[#86D1B3] rounded-full mr-2"></span> Holiday</span>
              <span className="flex items-center"><span className="w-2 h-2 bg-[#F58D85] rounded-full mr-2"></span> Sick</span>
              <span className="flex items-center"><span className="w-2 h-2 bg-[#7EB1E0] rounded-full mr-2"></span> Annual</span>
              <span className="flex items-center"><span className="w-2 h-2 bg-[#F8C48B] rounded-full mr-2"></span> Personal</span>
            </div>
          </div>

          <div className="p-6 overflow-auto flex-1 bg-[#FDFBF7]">
            <div className="grid grid-cols-7 gap-4 min-w-[800px]">
              {['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'].map(day => <div key={day} className="text-center font-black text-[#8C8476] pb-2 text-[10px]">{day}</div>)}
              {Array.from({length: startDayOfWeek}).map((_, i) => <div key={`empty-${i}`} className="h-32 bg-[#F5F2EA]/40 rounded-3xl"></div>)}
              {Array.from({length: daysInMonth}, (_, i) => i + 1).map(day => {
                const { hols, leaves } = getEventsForDay(day);
                return (
                  <div key={day} className="h-32 p-3 rounded-3xl border border-[#EBE6DD] bg-white flex flex-col">
                    <div className="text-right text-sm font-black text-[#4A4238] mb-1">{day}</div>
                    <div className="flex-1 overflow-y-auto space-y-1 no-scrollbar">
                      {hols.map((h, i) => (
                        <div key={`h-${i}`} className="text-[9px] bg-[#86D1B3] text-white px-2 py-0.5 rounded-full font-bold truncate leading-tight">🎉 {h.name}</div>
                      ))}
                      {leaves.map((l, i) => (
                        <div key={`l-${i}`} className="text-[9px] px-2 py-0.5 rounded-full font-bold truncate leading-tight flex items-center" style={{backgroundColor: `${COLORS[l.type]}44`, color: COLORS[l.type]}}>
                          <span className="w-1 h-1 rounded-full mr-1" style={{backgroundColor: COLORS[l.type]}}></span> {l.name}
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function EmployeesTab() {
      const [searchTerm, setSearchTerm] = useState('');
      const filteredEmployees = mockEmployees.filter(emp => emp.name.toLowerCase().includes(searchTerm.toLowerCase()));
      const [selectedEmployee, setSelectedEmployee] = useState(null);

      return (
        <div className="bg-white rounded-[2rem] shadow-sm border border-[#EBE6DD] flex flex-col h-full overflow-hidden">
          <div className="p-6 border-b border-[#EBE6DD] bg-[#FDFBF7] flex justify-between items-center">
            <h2 className="text-xl font-black text-[#4A4238]">ระบบพนักงาน</h2>
            <input type="text" placeholder="ค้นหาพนักงาน..." className="px-5 py-2 rounded-full border border-[#EBE6DD] text-sm focus:outline-none focus:ring-2 focus:ring-[#D3C8B4]" onChange={e => setSearchTerm(e.target.value)} />
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-left">
              <thead className="bg-[#F5F2EA] text-[#8C8476] text-xs font-black">
                <tr>
                  <th className="py-4 px-6">ชื่อ-นามสกุล</th>
                  <th className="py-4 px-6 text-center">วันลาพักร้อนคงเหลือ</th>
                  <th className="py-4 px-6 text-right">ดำเนินการ</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-[#EBE6DD]">
                {filteredEmployees.map(emp => {
                  const annual = mockBalances.find(b => b.userId === emp.id && b.type === 'Annual');
                  return (
                    <tr key={emp.id} className="hover:bg-[#FDFBF7]">
                      <td className="py-4 px-6 font-bold text-[#4A4238]">{emp.name}</td>
                      <td className="py-4 px-6 text-center font-black">{annual ? annual.remaining : 0} วัน</td>
                      <td className="py-4 px-6 text-right">
                        <button onClick={() => setSelectedEmployee(emp)} className="px-4 py-2 bg-[#F5F2EA] rounded-xl text-xs font-bold hover:bg-[#EBE6DD] transition-colors">ดูข้อมูล</button>
                      </td>
                    </tr>
                  )
                })}
              </tbody>
            </table>
          </div>

          {selectedEmployee && (
            <div className="fixed inset-0 bg-[#4A4238]/40 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setSelectedEmployee(null)}>
              <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-2xl shadow-2xl border border-[#EBE6DD]" onClick={e => e.stopPropagation()}>
                <h2 className="text-2xl font-black mb-6">{selectedEmployee.name}</h2>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                  {mockBalances.filter(b => b.userId === selectedEmployee.id).map((b, i) => (
                    <div key={i} className="p-5 rounded-3xl border border-[#EBE6DD] bg-[#FDFBF7]">
                      <p className="text-[10px] font-bold text-[#8C8476] mb-1 uppercase">{b.type}</p>
                      <p className="text-2xl font-black text-[#4A4238]">{b.remaining} <span className="text-xs font-normal">วัน</span></p>
                      <div className="w-full bg-[#EBE6DD] h-1.5 rounded-full mt-3 overflow-hidden">
                        <div className="h-full rounded-full" style={{backgroundColor: COLORS[b.type], width: `${(b.used/b.entitled)*100}%`}}></div>
                      </div>
                    </div>
                  ))}
                </div>
                <button onClick={() => setSelectedEmployee(null)} className="mt-8 w-full py-3 bg-[#4A4238] text-white rounded-2xl font-bold">ปิดหน้าต่าง</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function ReportsTab() {
      const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
      const summaryData = mockEmployees.map(emp => {
        const monthlyDays = Array(12).fill(0);
        let total = 0;
        mockRequests.filter(r => r.userId === emp.id && r.status === 'APPROVED' && r.startDate.startsWith('2026')).forEach(req => {
          const mIdx = parseInt(req.startDate.split('-')[1], 10) - 1;
          monthlyDays[mIdx] += req.days;
          total += req.days;
        });
        return { ...emp, monthlyDays, total };
      });

      return (
        <div className="bg-white rounded-[2rem] shadow-sm border border-[#EBE6DD] flex flex-col h-full overflow-hidden">
          <div className="p-6 border-b border-[#EBE6DD] bg-[#FDFBF7]"><h2 className="text-lg font-black text-[#4A4238]">รายงานประจำปี 2026</h2></div>
          <div className="overflow-x-auto p-6 bg-[#F5F2EA]">
            <table className="w-full text-left border-collapse bg-white rounded-2xl overflow-hidden shadow-sm">
              <thead className="bg-[#FDFBF7] text-[#8C8476] text-[10px] font-bold uppercase tracking-widest border-b border-[#EBE6DD]">
                <tr>
                  <th className="py-4 px-5 border-r border-[#EBE6DD] sticky left-0 bg-[#FDFBF7]">พนักงาน</th>
                  {months.map(m => <th key={m} className="py-4 px-2 text-center border-r border-[#EBE6DD]">{m}</th>)}
                  <th className="py-4 px-5 text-center bg-[#F5F2EA]">รวม</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-[#EBE6DD]">
                {summaryData.map(emp => (
                  <tr key={emp.id} className="hover:bg-[#FDFBF7] transition-colors">
                    <td className="py-3 px-5 border-r border-[#EBE6DD] font-bold text-sm text-[#4A4238] sticky left-0 bg-white shadow-[1px_0_0_0_#EBE6DD]">{emp.name}</td>
                    {emp.monthlyDays.map((d, i) => (
                      <td key={i} className={`py-3 px-2 text-center text-xs font-bold border-r border-[#EBE6DD] ${d > 0 ? 'text-[#4A4238] bg-[#F5F2EA]' : 'text-[#D3C8B4]'}`}>{d > 0 ? d : '-'}</td>
                    ))}
                    <td className="py-3 px-5 text-center font-black bg-[#F5F2EA]">{emp.total}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState('overview');
      const stats = { pending: 3, avgDays: '1.2', mostFrequent: 'Sick', onLeaveToday: 2 };

      return (
        <div className="flex h-screen bg-[#F5F2EA]">
          <aside className="bg-[#FDFBF7] w-64 border-r border-[#EBE6DD] hidden md:flex flex-col shadow-sm">
            <div className="h-20 flex items-center px-8 border-b border-[#EBE6DD] bg-white"><span className="text-xl font-black text-[#4A4238]">LeaveApp</span></div>
            <nav className="flex-1 p-5 space-y-2">
              <NavItem icon={<i className="fa-solid fa-chart-pie"></i>} label="ภาพรวม" active={activeTab === 'overview'} onClick={() => setActiveTab('overview')} />
              <NavItem icon={<i className="fa-solid fa-calendar"></i>} label="ปฏิทิน" active={activeTab === 'calendar'} onClick={() => setActiveTab('calendar')} />
              <NavItem icon={<i className="fa-solid fa-users"></i>} label="พนักงาน" active={activeTab === 'employees'} onClick={() => setActiveTab('employees')} />
              <NavItem icon={<i className="fa-solid fa-table"></i>} label="รายงาน" active={activeTab === 'reports'} onClick={() => setActiveTab('reports')} />
            </nav>
          </aside>
          <div className="flex-1 flex flex-col overflow-hidden">
            <header className="h-20 bg-[#FDFBF7] border-b border-[#EBE6DD] flex items-center px-8"><h1 className="text-2xl font-black text-[#4A4238] tracking-tight capitalize">{activeTab}</h1></header>
            <main className="flex-1 overflow-auto p-8 bg-[#F5F2EA]">
              {activeTab === 'overview' && <OverviewTab stats={stats} onNavigate={t => document.getElementById('this-month-leave-table')?.scrollIntoView({behavior: 'smooth'})} />}
              {activeTab === 'calendar' && <CalendarTab />}
              {activeTab === 'employees' && <EmployeesTab />}
              {activeTab === 'reports' && <ReportsTab />}
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
