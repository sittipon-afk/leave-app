<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">

      } 
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; } 
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; } 
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; font-size: 15px; }
    .glass-card { background: #ffffff; border: 1px solid #e2e8f0; }
    .data-row:hover { background-color: #f8fafc; }
    .btn-shadow { box-shadow: 0 4px 10px 0 rgba(15, 23, 42, 0.1); }
    .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
    
    /* AI UI Enhancements */
    .ai-gradient-text {
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .ai-border {
      border: 2px solid transparent;
      background: linear-gradient(#ffffff, #ffffff) padding-box, 
                  linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899) border-box;
    }
    .ai-draft-box {
      background: linear-gradient(135deg, rgba(238,242,255,0.7) 0%, rgba(250,232,255,0.7) 100%);
      border: 1px solid #e2e8f0;
    }
  </style>
</head>
<body class="text-[#0f172a]">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { 
      BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, 
      Legend, PieChart, Pie, Cell, ResponsiveContainer, LineChart, Line 
    } = window.Recharts;
    const { createClient } = window.supabase;

    const SUPABASE_URL = 'https://kmmeeqinzfgtoilrabir.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttbWVlcWluemZndG9pbHJhYmlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Njg2MTcsImV4cCI6MjA4ODI0NDYxN30.zrccfQOVFQof1jMj1TRbPiIYYukcnYYBqi3i1x6qir0';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ฟังก์ชันช่วยจัดการสีตามประเภทการลา
    const getThemeColor = (type) => {
      if (!type) return '#64748b'; // Default Slate
      const t = type.toLowerCase();
      if (t.includes('annual')) return '#3b82f6'; // Blue
      if (t.includes('sick')) return '#ef4444';   // Red
      if (t.includes('personal') || t.includes('business')) return '#f59e0b'; // Amber
      return '#8b5cf6'; // Purple
    };

    // --- Gemini API Function ---
    const callGeminiAPI = async (prompt) => {
      const apiKey = ""; 
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = { contents: [{ parts: [{ text: prompt }] }] };

      let retries = 5;
      let delay = 1000;
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const result = await response.json();
          return result.candidates[0].content.parts[0].text;
        } catch (error) {
          if (i === retries - 1) return "ขออภัย เกิดข้อผิดพลาดในการเชื่อมต่อกับ AI ในขณะนี้ โปรดลองใหม่อีกครั้งภายหลัง";
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
    };

    // --- Core UI Components ---

    const NavItem = ({ icon, label, active, onClick, badge }) => (
      <button
        onClick={onClick}
        className={`w-full flex items-center px-4 py-3.5 text-sm font-bold transition-all group ${
          active 
          ? 'bg-brand-900 text-white shadow-lg rounded-xl' 
          : 'text-brand-500 hover:text-brand-900 hover:bg-slate-50 rounded-xl'
        }`}
      >
        <span className={`mr-3 text-lg w-6 text-center ${active ? 'text-white' : 'text-slate-400 group-hover:text-brand-700'}`}>{icon}</span>
        {label}
        {badge > 0 && (
          <span className="ml-auto bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-black">
            {badge}
          </span>
        )}
      </button>
    );

    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay animate-in fade-in duration-200">
          <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden animate-in zoom-in-95 duration-200 flex flex-col max-h-[90vh]">
            <div className="px-8 py-6 border-b border-slate-100 flex justify-between items-center shrink-0">
              <h3 className="text-xl font-black text-brand-900">{title}</h3>
              <button onClick={onClose} className="w-8 h-8 rounded-full bg-slate-50 text-brand-900 flex items-center justify-center hover:rotate-90 transition-all text-sm">
                <i className="fa-solid fa-xmark"></i>
              </button>
            </div>
            <div className="p-8 overflow-y-auto no-scrollbar">{children}</div>
          </div>
        </div>
      );
    };

    // --- Overview Analytics Tab ---

    const OverviewTab = ({ stats, employees, requests, holidays, balances }) => {
      const [trendUser, setTrendUser] = useState('ALL');
      const today = new Date().toLocaleDateString('en-CA');

      const usageStats = useMemo(() => {
        return employees.map(emp => {
          const empBalances = balances.filter(b => b.userId === emp.id);
          const totalEntitled = empBalances.reduce((s, b) => s + (b.entitled || 0), 0);
          const totalUsed = empBalances.reduce((s, b) => s + (b.used || 0), 0);
          return { name: emp.name, usageRate: totalEntitled > 0 ? Math.round((totalUsed / totalEntitled) * 100) : 0 };
        }).sort((a, b) => b.usageRate - a.usageRate);
      }, [employees, balances]);

      const trendData = useMemo(() => {
        const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        const data = months.map(m => ({ name: m, total: 0 }));
        requests.filter(r => r.status === 'APPROVED' && (trendUser === 'ALL' || r.userId === trendUser)).forEach(r => {
          if (r.startDate?.startsWith('2026')) {
            const mIdx = parseInt(r.startDate.split('-')[1]) - 1;
            if (mIdx >= 0 && mIdx < 12) data[mIdx].total += r.days;
          }
        });
        return data;
      }, [requests, trendUser]);

      const distData = useMemo(() => {
        const counts = { Annual: 0, Sick: 0, Personal: 0, Other: 0 };
        requests.filter(r => r.status === 'APPROVED').forEach(r => {
          const t = (r.type || '').toLowerCase();
          if(t.includes('annual')) counts.Annual += r.days;
          else if(t.includes('sick')) counts.Sick += r.days;
          else if(t.includes('personal') || t.includes('business')) counts.Personal += r.days;
          else counts.Other += r.days;
        });
        return [
          { name: 'พักร้อน', value: counts.Annual, type: 'Annual' },
          { name: 'ลาป่วย', value: counts.Sick, type: 'Sick' },
          { name: 'ลากิจ', value: counts.Personal, type: 'Personal' },
          { name: 'อื่นๆ', value: counts.Other, type: 'Other' }
        ];
      }, [requests]);

      const upcomingHolidays = useMemo(() => {
        return holidays.filter(h => h.date >= today).sort((a, b) => a.date.localeCompare(b.date)).slice(0, 4);
      }, [holidays, today]);

      // คำนวณสถานะกำลังพลประจำวัน
      const absencesTodayCount = requests.filter(r => r.status === 'APPROVED' && r.startDate <= today && r.endDate >= today).length;
      const totalEmployees = employees.length;
      const activeWorkforce = totalEmployees - absencesTodayCount;
      const activePercentage = totalEmployees > 0 ? ((activeWorkforce / totalEmployees) * 100).toFixed(1) : 0;

      return (
        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
          
          {/* Daily Operational Brief (Pixel-perfect matching) */}
          <div className="bg-[#0f172a] p-6 rounded-[1.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.08)] flex flex-col sm:flex-row justify-between items-center text-white border-[4px] border-white">
            <div className="flex items-center space-x-5 mb-4 sm:mb-0">
              <div className="w-14 h-14 rounded-[1rem] bg-[#1e293b] flex items-center justify-center text-white text-2xl border border-slate-600/50 shadow-inner">
                <i className="fa-solid fa-users-viewfinder"></i>
              </div>
              <div>
                <h3 className="font-black text-xl tracking-tight">สถานะกำลังพลประจำวัน (Daily Brief)</h3>
                <p className="text-sm text-slate-300 font-medium mt-1">ข้อมูลอัปเดต ณ วันที่ {today}</p>
              </div>
            </div>
            <div className="flex items-center space-x-8 text-center sm:text-right">
              <div>
                <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">พนักงานทั้งหมด</p>
                <p className="text-2xl font-black">{totalEmployees} <span className="text-sm font-medium text-slate-400">คน</span></p>
              </div>
              <div className="w-[1px] h-12 bg-slate-700"></div>
              <div>
                <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">อัตรากำลังพลพร้อมทำงาน</p>
                <p className="text-3xl font-black text-emerald-400">{activePercentage}%</p>
              </div>
            </div>
          </div>

          {/* KPI Cards */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            {[
              { label: 'รอการอนุมัติ', val: stats.pending, icon: 'fa-hourglass-half', color: 'text-orange-500', sub: 'คำขอใหม่' },
              { label: 'อัตราใช้สิทธิลา', val: `${stats.usageRate}%`, icon: 'fa-chart-pie', color: 'text-blue-500', sub: 'เฉลี่ยทั้งองค์กร' },
              { label: 'วันลาเฉลี่ย/คน', val: `${stats.avgDays} วัน`, icon: 'fa-user-clock', color: 'text-emerald-500', sub: 'ปี 2026' },
              { label: 'ลาบ่อยสุด', val: stats.mostFrequent, icon: 'fa-tags', color: 'text-slate-800', sub: 'ประเภทหลัก' }
            ].map((kpi, idx) => (
              <div key={idx} className="glass-card p-6 rounded-[1.5rem] shadow-sm flex flex-col justify-center border-none text-brand-900">
                <div className="flex justify-between items-center mb-3">
                  <span className="text-[11px] font-black uppercase tracking-widest text-slate-400">{kpi.label}</span>
                  <i className={`fa-solid ${kpi.icon} ${kpi.color} opacity-70 text-lg`}></i>
                </div>
                <h3 className="text-3xl font-black tracking-tighter">{kpi.val}</h3>
                <p className="text-xs font-bold mt-2 text-slate-400">{kpi.sub}</p>
              </div>
            ))}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            {/* กราฟเส้น (แนวโน้มการลา) */}
            <div className="glass-card p-8 rounded-[2rem] shadow-sm relative">
              <div className="flex justify-between items-start mb-8">
                <div>
                  <h3 className="text-xl font-black text-brand-900">แนวโน้มการลา</h3>
                  <p className="text-slate-400 text-xs font-bold mt-1">เปรียบเทียบสถิติแต่ละเดือน (ปี 2026)</p>
                </div>
                <select className="bg-slate-50 px-4 py-2 rounded-xl text-xs font-black text-brand-900 outline-none cursor-pointer border border-slate-200" value={trendUser} onChange={e => setTrendUser(e.target.value)}>
                   <option value="ALL">รวมทั้งหมด</option>
                   {employees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                </select>
              </div>
              <div className="h-64">
                <ResponsiveContainer width="100%" height="100%">
                  <LineChart data={trendData} margin={{ top: 5, right: 10, left: -20, bottom: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                    <XAxis dataKey="name" tick={{ fontSize: 11, fontWeight: 700, fill: '#64748b' }} axisLine={false} tickLine={false} />
                    <YAxis tick={{ fontSize: 11, fontWeight: 700, fill: '#64748b' }} axisLine={false} tickLine={false} />
                    <RechartsTooltip contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)', fontWeight: 700, fontSize: '12px' }} />
                    <Line type="monotone" dataKey="total" stroke="#0f172a" strokeWidth={3} dot={{ r: 4, fill: '#0f172a', strokeWidth: 2, stroke: '#fff' }} activeDot={{ r: 6, strokeWidth: 0 }} />
                  </LineChart>
                </ResponsiveContainer>
              </div>
            </div>

            {/* กราฟโดนัท (ปริมาณการลาแยกประเภท) */}
            <div className="glass-card p-8 rounded-[2rem] shadow-sm">
              <div className="mb-8">
                <h3 className="text-xl font-black text-brand-900">การลาแยกตามประเภท</h3>
                <p className="text-slate-400 text-xs font-bold mt-1">สัดส่วนวันลาที่ใช้ไปทั้งหมด</p>
              </div>
              <div className="h-64">
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie 
                      data={distData} 
                      cx="50%" 
                      cy="45%" 
                      innerRadius={65} 
                      outerRadius={90} 
                      paddingAngle={6} 
                      stroke="none" 
                      dataKey="value"
                    >
                      {distData.map((entry, index) => (
                        <Cell key={`cell-${index}`} fill={getThemeColor(entry.type)} />
                      ))}
                    </Pie>
                    <RechartsTooltip contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)', fontWeight: 700, fontSize: '13px' }} />
                    <Legend verticalAlign="bottom" iconType="circle" wrapperStyle={{ paddingTop: '20px', fontSize: '12px', fontWeight: 'bold' }} />
                  </PieChart>
                </ResponsiveContainer>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            {/* พนักงานที่ลาวันนี้ */}
            <div className="glass-card rounded-[2rem] p-8 shadow-sm">
              <div className="flex justify-between items-center mb-6">
                 <div>
                   <h3 className="text-lg font-black text-brand-900">พนักงานที่ลาวันนี้</h3>
                 </div>
                 <span className="bg-red-50 text-red-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-red-100">Active Today</span>
              </div>
              <div className="space-y-4 max-h-[300px] overflow-y-auto no-scrollbar">
                {requests.filter(r => r.status === 'APPROVED' && r.startDate <= today && r.endDate >= today).map((abs, i) => (
                  <div key={i} className="flex items-center p-4 bg-slate-50 rounded-2xl border border-transparent hover:border-slate-200 transition-colors">
                     <div className="w-10 h-10 rounded-xl text-white flex items-center justify-center font-black text-sm mr-4 shadow-md" style={{ backgroundColor: getThemeColor(abs.type) }}>
                        {abs.name?.charAt(0)}
                     </div>
                     <div className="flex-1">
                        <p className="text-sm font-bold text-brand-900 leading-tight">{abs.name}</p>
                        <p className="text-[10px] font-bold mt-1 uppercase tracking-widest" style={{ color: getThemeColor(abs.type) }}>
                          {abs.type}
                        </p>
                     </div>
                     <div className="text-right">
                        <p className="text-[10px] font-bold text-slate-500 bg-white px-3 py-1.5 rounded-lg border border-slate-200">ถึง {abs.endDate}</p>
                     </div>
                  </div>
                ))}
                {requests.filter(r => r.status === 'APPROVED' && r.startDate <= today && r.endDate >= today).length === 0 && (
                  <div className="py-12 text-center text-slate-400 font-bold text-sm">ไม่มีพนักงานลาในวันนี้</div>
                )}
              </div>
            </div>

            {/* วันหยุดถัดไป */}
            <div className="glass-card rounded-[2rem] p-8 shadow-sm">
              <div className="flex justify-between items-center mb-6">
                 <div>
                   <h3 className="text-lg font-black text-brand-900">วันหยุดถัดไป</h3>
                 </div>
                 <i className="fa-solid fa-calendar-star text-emerald-500 text-xl"></i>
              </div>
              <div className="space-y-4">
                {upcomingHolidays.length > 0 ? upcomingHolidays.map((h, i) => (
                  <div key={i} className="flex items-center p-4 bg-white rounded-2xl border border-slate-100 hover:border-emerald-200 shadow-sm transition-colors">
                    <div className="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex flex-col items-center justify-center font-black mr-4">
                       <span className="text-xl leading-none">{new Date(h.date).getDate()}</span>
                       <span className="text-[9px] uppercase mt-0.5">{new Date(h.date).toLocaleString('th', {month: 'short'})}</span>
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-bold text-brand-900 truncate">{h.name}</p>
                      <p className="text-[11px] font-medium text-slate-500 mt-0.5">
                        {new Date(h.date).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })}
                      </p>
                    </div>
                  </div>
                )) : (
                  <div className="py-12 text-center text-slate-400 font-bold text-sm">ไม่มีวันหยุดในเร็วๆ นี้</div>
                )}
              </div>
            </div>
          </div>

          {/* วิเคราะห์สัดส่วนการใช้สิทธิลา */}
          <div className="glass-card p-8 rounded-[2rem] shadow-sm">
            <div className="mb-8">
              <h3 className="text-xl font-black text-brand-900">วิเคราะห์สัดส่วนการใช้สิทธิลา</h3>
              <p className="text-slate-400 text-xs font-bold mt-1">สัดส่วนการใช้วันลาของพนักงานเทียบกับสิทธิทั้งหมด (%)</p>
            </div>
            <div className="h-80">
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={usageStats} layout="vertical" margin={{ left: 20, right: 30 }}>
                  <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#e2e8f0" />
                  <XAxis type="number" domain={[0, 100]} hide />
                  <YAxis dataKey="name" type="category" tick={{ fontSize: 12, fontWeight: 'bold', fill: '#475569' }} axisLine={false} tickLine={false} width={150} />
                  <RechartsTooltip cursor={{fill: '#f1f5f9'}} contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)', fontWeight: 700, fontSize: '13px' }} />
                  <Bar dataKey="usageRate" fill="#3b82f6" radius={[0, 8, 8, 0]} barSize={24} label={{ position: 'right', fontSize: 11, fontWeight: 'black', fill: '#3b82f6', formatter: (v) => `${v}%` }} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
      );
    }

    // --- หน้าปฏิทิน ---

    const CalendarTab = ({ holidays, requests }) => {
      const [viewDate, setViewDate] = useState(new Date(2026, 2, 1)); 
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const monthDays = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();

      const getDayData = (day) => {
        const dStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
        return {
          hols: holidays.filter(h => h.date === dStr),
          leaves: requests.filter(r => r.status === 'APPROVED' && r.startDate <= dStr && r.endDate >= dStr)
        };
      };

      return (
        <div className="glass-card rounded-[2rem] shadow-sm flex flex-col h-full overflow-hidden animate-in zoom-in-95 duration-500">
          <div className="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-white">
            <div className="flex items-center space-x-6">
              <button onClick={() => setViewDate(new Date(year, month-1, 1))} className="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-brand-900 hover:bg-slate-200 transition-colors"><i className="fa-solid fa-chevron-left text-sm"></i></button>

    // --- Main Layout ---

    function App() {
      const [activeTab, setActiveTab] = useState('overview');
      const [loading, setLoading] = useState(true);
      const [employees, setEmployees] = useState([]);
      const [balances, setBalances] = useState([]);
      const [requests, setRequests] = useState([]);
      const [holidays, setHolidays] = useState([]);

      const fetchData = async () => {
        try {
          const [ { data: empData }, { data: balData }, { data: reqData }, { data: holData } ] = await Promise.all([
            supabase.from('employees').select('*'),
            supabase.from('leave_balance').select('*'),
            supabase.from('leave_requests').select('*'),
            supabase.from('holidays').select('*')
          ]);

          setEmployees((empData || []).map(e => ({ id: e.user_id, name: e.full_name || e.displayname, department: e.company })));
          setBalances((balData || []).map(b => ({ userId: b.user_id, type: b.leave_type || '', entitled: parseFloat(b.entitled) || 0, used: parseFloat(b.used) || 0, remaining: parseFloat(b.remaining) || 0 })));
          setRequests((reqData || []).map(r => ({ id: r.request_id, userId: r.user_id, name: r.name, type: r.leave_type || '', startDate: r.start_date, endDate: r.end_date, days: parseFloat(r.leave_days) || 0, reason: r.reason, status: r.status })));
          setHolidays((holData || []).map(h => ({ date: h.holiday_date || h.date, name: h.holiday_name || h.name })));
        } catch (error) { console.error("ERR:", error); } 
        finally { setLoading(false); }
      };

      const handleRequestAction = async (requestId, status) => {
        try {
          const { error } = await supabase.from('leave_requests').update({ status: status }).eq('request_id', requestId);
          if (error) throw error;
          fetchData();
        } catch (err) { console.error("Update Error:", err); }
      };

      useEffect(() => {
        fetchData();
        const sub = supabase.channel('pro_v4_ai').on('postgres_changes', { event: '*', schema: 'public' }, fetchData).subscribe();
        return () => { supabase.removeChannel(sub); };
      }, []);

      const stats = useMemo(() => {
        const pending = requests.filter(r => r.status === 'PENDING' || r.status === 'SUBMITTED').length;
        const totalApproved = requests.filter(r => r.status === 'APPROVED').reduce((sum, r) => sum + r.days, 0);
        const totalCredits = balances.reduce((s, b) => s + (b.entitled || 0), 0);
        const totalUsed = balances.reduce((s, b) => s + (b.used || 0), 0);
        
        const typeCount = {};
        requests.filter(r => r.status === 'APPROVED').forEach(r => { 
          const t = (r.type || '').toLowerCase().includes('annual') ? 'Annual' : (r.type || '').toLowerCase().includes('sick') ? 'Sick' : 'Other';
          typeCount[t] = (typeCount[t] || 0) + 1; 
        });
        const mostFrequent = Object.keys(typeCount).length > 0 ? Object.keys(typeCount).reduce((a, b) => typeCount[a] > typeCount[b] ? a : b) : 'ไม่มีข้อมูล';

        return {
          pending,
          avgDays: employees.length > 0 ? (totalApproved / employees.length).toFixed(1) : 0,
          usageRate: totalCredits > 0 ? Math.round((totalUsed / totalCredits) * 100) : 0,
          mostFrequent
        };
      }, [requests, employees, balances]);

      if (loading) return (
        <div className="flex h-screen items-center justify-center bg-brand-900 text-white font-black text-2xl tracking-tight">
          <i className="fa-solid fa-spinner-third animate-spin mr-3"></i> กำลังเชื่อมต่อระบบ...
        </div>
      );

      return (
        <div className="flex h-screen bg-slate-50 font-sans selection:bg-brand-900 selection:text-white overflow-hidden">
          <aside className="bg-white w-[260px] border-r border-slate-200 hidden md:flex flex-col z-30 shadow-lg">
            <div className="h-24 flex items-center px-8 border-b border-slate-100">
              <div className="w-10 h-10 bg-brand-900 rounded-[0.8rem] flex items-center justify-center mr-3 shadow-md text-white">
                <i className="fa-solid fa-microchip"></i>
              </div>
              <div>
                <span className="text-2xl font-black text-brand-900 block leading-none tracking-tight">Pro</span>
                <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest block mt-1">Analytics Engine</span>
              </div>
            </div>
            
            <div className="flex-1 px-5 space-y-2 mt-8">
              <NavItem icon={<i className="fa-solid fa-chart-line"></i>} label="ภาพรวม" active={activeTab === 'overview'} onClick={() => setActiveTab('overview')} />
              <NavItem icon={<i className="fa-solid fa-list-check"></i>} label="รออนุมัติ" active={activeTab === 'pending'} onClick={() => setActiveTab('pending')} badge={stats.pending} />
              <NavItem icon={<i className="fa-solid fa-calendar-days"></i>} label="ปฏิทิน" active={activeTab === 'calendar'} onClick={() => setActiveTab('calendar')} />
              <NavItem icon={<i className="fa-solid fa-users-gear"></i>} label="พนักงาน" active={activeTab === 'employees'} onClick={() => setActiveTab('employees')} />
            </div>
          </aside>

          <div className="flex-1 flex flex-col relative overflow-hidden">
            <header className="h-24 bg-white/80 backdrop-blur-xl border-b border-slate-200 flex items-center px-10 z-20">
              <h1 className="text-3xl font-black text-brand-900 tracking-tight flex items-center">
                 {activeTab === 'overview' ? 'แดชบอร์ดอัจฉริยะ' : 
                  activeTab === 'pending' ? 'รายการตรวจสอบ' : 
                  activeTab === 'calendar' ? 'ปฏิทินการลา' : 
                  'ฐานข้อมูลพนักงาน'}
              </h1>
            </header>

            <main className="flex-1 overflow-auto p-10 no-scrollbar bg-slate-50">
              {activeTab === 'overview' && <OverviewTab stats={stats} employees={employees} requests={requests} holidays={holidays} balances={balances} />}
              {activeTab === 'pending' && <PendingTab requests={requests} balances={balances} onAction={handleRequestAction} />}
              {activeTab === 'calendar' && <CalendarTab holidays={holidays} requests={requests} />}
              {activeTab === 'employees' && <EmployeesTab employees={employees} balances={balances} />}
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
