<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave Dashboard System</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
      theme: { 
        extend: { 
          fontFamily: { sans: ['Prompt', 'sans-serif'] } 
        } 
      } 
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #F5F2EA; border-radius: 4px; } 
    ::-webkit-scrollbar-thumb { background: #D3C8B4; border-radius: 4px; } 
    ::-webkit-scrollbar-thumb:hover { background: #8C8476; } 
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { font-family: 'Prompt', sans-serif; font-size: 16px; }
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: 0.6;
    }
    input[type="date"]::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
    }
  </style>
</head>
<body class="bg-[#F5F2EA] text-[#4A4238] selection:bg-[#D3E4CD] selection:text-[#3A4D39]">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, PieChart, Pie, Cell, ResponsiveContainer } = window.Recharts;
    const { createClient } = window.supabase;

    const SUPABASE_URL = 'https://kmmeeqinzfgtoilrabir.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttbWVlcWluemZndG9pbHJhYmlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Njg2MTcsImV4cCI6MjA4ODI0NDYxN30.zrccfQOVFQof1jMj1TRbPiIYYukcnYYBqi3i1x6qir0';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const COLORS = { Annual: '#7EB1E0', Sick: '#F58D85', Personal: '#F8C48B', Other: '#C5B1D4', Holiday: '#86D1B3' };
    const TEXT_COLORS = { Annual: '#2C5282', Sick: '#9B2C2C', Personal: '#9C4221', Other: '#503D56', Holiday: '#22543D' };
    
    function NavItem({ icon, label, active, onClick, badge }) {
      return (
        <button
          onClick={onClick}
          className={`w-full flex items-center px-5 py-4 text-lg font-bold rounded-2xl transition-all relative ${
            active ? 'bg-[#F5F2EA] text-[#4A4238] shadow-sm' : 'text-[#8C8476] hover:bg-[#F5F2EA]/50 hover:text-[#4A4238]'
          }`}
        >
          <span className={`mr-4 w-6 h-6 flex items-center justify-center text-xl ${active ? 'text-[#8C8476]' : 'text-[#D3C8B4]'}`}>{icon}</span>
          {label}
          {badge > 0 && (
            <span className="absolute right-4 top-1/2 -translate-y-1/2 bg-[#F58D85] text-white text-xs font-black w-6 h-6 flex items-center justify-center rounded-full shadow-sm">
              {badge}
            </span>
          )}
        </button>
      );
    }

    function StatCard({ title, value, subtitle, icon, bgColor, textColor, onClick }) {
      return (
        <div onClick={onClick} className={`bg-white p-6 rounded-3xl shadow-sm border border-[#EBE6DD] transition-all ${onClick ? 'cursor-pointer hover:shadow-md hover:-translate-y-1' : ''}`}>
          <div className="flex items-center justify-between">
            <div>
              <p className="text-lg font-bold text-[#8C8476] mb-1">{title}</p>
              <p className="text-4xl font-black text-[#4A4238]">{value}</p>
              {subtitle && <p className="text-base font-semibold text-[#D3C8B4] mt-1">{subtitle}</p>}
            </div>
            <div className={`p-4 rounded-2xl flex items-center justify-center w-16 h-16 ${bgColor} ${textColor} shadow-sm text-2xl`}>{icon}</div>
          </div>
        </div>
      );
    }

    function PendingTab({ requests }) {
      const pendingRequests = requests.filter(r => r.status === 'PENDING' || r.status === 'SUBMITTED');
      return (
        <div className="bg-white rounded-[2.5rem] shadow-sm border border-[#EBE6DD] flex flex-col h-full overflow-hidden animate-in fade-in duration-500">
          <div className="p-8 border-b border-[#EBE6DD] bg-[#FDFBF7] flex justify-between items-center">
            <h2 className="text-3xl font-black text-[#4A4238]">รายการที่รอการอนุมัติ</h2>
            <span className="bg-[#FCE2C2] text-[#7A5A35] px-6 py-2 rounded-full text-base font-black border border-[#EBE6DD]">
              ทั้งหมด {pendingRequests.length} รายการ
            </span>
          </div>
          <div className="overflow-x-auto flex-1">
            <table className="w-full text-left">
              <thead className="bg-[#F5F2EA] text-[#8C8476] text-base font-black uppercase tracking-widest">
                <tr>
                  <th className="py-6 px-10">พนักงาน</th>
                  <th className="py-6 px-10">ประเภท</th>
                  <th className="py-6 px-10">วันที่ลา</th>
                  <th className="py-6 px-10">จำนวน</th>
                  <th className="py-6 px-10">เหตุผล</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-[#EBE6DD] text-lg">
                {pendingRequests.length > 0 ? pendingRequests.map(req => (
                  <tr key={req.id} className="hover:bg-[#FDFBF7] transition-colors">
                    <td className="py-7 px-10 font-bold text-[#4A4238] text-xl">{req.name}</td>
                    <td className="py-7 px-10">
                       <span className="inline-flex items-center px-5 py-2 rounded-full text-sm font-black shadow-sm" style={{backgroundColor: `${COLORS[req.type] || '#EBE6DD'}44`, color: TEXT_COLORS[req.type] || '#4A4238', border: `1px solid ${COLORS[req.type]}66`}}>
                         {req.type}
                       </span>
                    </td>
                    <td className="py-7 px-10 font-semibold text-[#8C8476]">{req.startDate}</td>
                    <td className="py-7 px-10 font-black text-[#4A4238] text-xl">{req.days} <span className="text-sm font-bold text-[#8C8476]">วัน</span></td>
                    <td className="py-7 px-10 text-[#8C8476] truncate max-w-xs">{req.reason || '-'}</td>
                  </tr>
                )) : (
                  <tr><td colSpan="5" className="py-32 text-center font-bold text-[#D3C8B4] text-2xl">ไม่มีรายการรออนุมัติในขณะนี้</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function OverviewTab({ stats, employees, requests, holidays, onNavigate }) {
      const [chartUser, setChartUser] = useState('ALL');
      const todayString = new Date().toLocaleDateString('en-CA');
      const [selectedAbsenceDate, setSelectedAbsenceDate] = useState(todayString);
      const currentMonth = new Date().toISOString().slice(0, 7); 

      const pieData = useMemo(() => {
        let ann = 0, sick = 0, per = 0, oth = 0;
        requests.filter(r => r.status === 'APPROVED').forEach(r => {
          if(r.type === 'Annual') ann += r.days;
          else if(r.type === 'Sick') sick += r.days;
          else if(r.type === 'Personal') per += r.days;
          else oth += r.days;
        });
        return [
          { name: 'ลาพักร้อน', value: ann, fill: COLORS.Annual },
          { name: 'ลาป่วย', value: sick, fill: COLORS.Sick },
          { name: 'ลากิจ', value: per, fill: COLORS.Personal },
          { name: 'อื่นๆ', value: oth, fill: COLORS.Other }
        ].filter(d => d.value > 0); 
      }, [requests]);
      
      const dynamicBarData = useMemo(() => {
        const monthlyDays = Array(12).fill(0);
        const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        const filteredReqs = requests.filter(req => 
          req.status === 'APPROVED' && 
          req.startDate && req.startDate.startsWith('2026') &&
          (chartUser === 'ALL' || req.userId === chartUser)
        );
        filteredReqs.forEach(req => {
          const monthIdx = parseInt(req.startDate.split('-')[1], 10) - 1;
          if (monthIdx >= 0 && monthIdx < 12) monthlyDays[monthIdx] += req.days;
        });
        return months.map((m, i) => ({ name: m, days: monthlyDays[i] }));
      }, [chartUser, requests]);

      const upcomingHolidays = useMemo(() => {
        return holidays.filter(h => h.date && h.date >= todayString).sort((a, b) => a.date.localeCompare(b.date)).slice(0, 4);
      }, [holidays, todayString]);

      const absencesOnDate = useMemo(() => {
        return requests.filter(r => r.status === 'APPROVED' && r.startDate <= selectedAbsenceDate && r.endDate >= selectedAbsenceDate);
      }, [requests, selectedAbsenceDate]);

      const thisMonthLeaves = useMemo(() => {
        return requests.filter(req => req.startDate && req.startDate.startsWith(currentMonth) && req.status === 'APPROVED');
      }, [requests, currentMonth]);

      return (
        <div className="space-y-10 animate-in fade-in duration-500">
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <StatCard title="รออนุมัติ" value={stats.pending} subtitle="รายการคำขอใหม่" icon={<i className="fa-solid fa-clock"></i>} bgColor="bg-[#FCE2C2]" textColor="text-[#7A5A35]" onClick={() => onNavigate('pending')} />
            <StatCard title="การใช้สิทธิลา" value={`${stats.usageRate}%`} subtitle="จากสิทธิทั้งหมด" icon={<i className="fa-solid fa-percent"></i>} bgColor="bg-[#D3E4CD]" textColor="text-[#3A4D39]" />
            <StatCard title="วันลาเฉลี่ย/คน" value={`${stats.avgDays} วัน`} subtitle="ตั้งแต่ต้นปี" icon={<i className="fa-solid fa-chart-simple"></i>} bgColor="bg-[#D1E8E2]" textColor="text-[#365A53]" />
            <StatCard title="ลาบ่อยสุด" value={stats.mostFrequent || '-'} subtitle="ประเภทลาหลัก" icon={<i className="fa-solid fa-file-lines"></i>} bgColor="bg-[#E1D1E7]" textColor="text-[#503D56]" />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div className="lg:col-span-2 space-y-10">
              {/* Chart Section */}
              <div className="bg-white p-8 rounded-3xl shadow-sm border border-[#EBE6DD]">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10 gap-4">
                  <h3 className="text-2xl font-bold text-[#4A4238]">แนวโน้มการลาแต่ละเดือน</h3>
                  <div className="flex items-center space-x-3 bg-[#F5F2EA] rounded-full px-5 py-2.5 border border-[#EBE6DD]">
                    <i className="fa-solid fa-user text-[#8C8476] text-base"></i>
                    <select className="text-base font-bold bg-transparent focus:outline-none text-[#4A4238] cursor-pointer" value={chartUser} onChange={(e) => setChartUser(e.target.value)}>
                      <option value="ALL">พนักงานทั้งหมด (รวม)</option>
                      {employees.map(emp => <option key={emp.id} value={emp.id}>{emp.name}</option>)}
                    </select>
                  </div>
                </div>
                <div className="h-80">
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={dynamicBarData} margin={{ top: 10, right: 10, left: -10, bottom: 0 }}>
                      <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#EBE6DD" />
                      <XAxis dataKey="name" tick={{ fontSize: 14, fill: '#8C8476', fontWeight: 'bold' }} axisLine={false} tickLine={false} />
                      <YAxis tick={{ fontSize: 14, fill: '#8C8476', fontWeight: 'bold' }} axisLine={false} tickLine={false} />
                      <RechartsTooltip cursor={{fill: '#F5F2EA'}} contentStyle={{ backgroundColor: '#FDFBF7', borderColor: '#EBE6DD', borderRadius: '16px', fontWeight: '700', fontSize: '15px' }} />
                      <Bar dataKey="days" fill="#8C8476" radius={[12, 12, 12, 12]} barSize={45} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>

              {/* Today Absence Section with Date Picker */}
              <div className="bg-white p-8 rounded-3xl shadow-sm border border-[#EBE6DD]">
                <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-10 gap-4">
                  <h3 className="text-2xl font-bold text-[#4A4238]">รายชื่อผู้ลา (ประจำวันที่...)</h3>
                  <div className="flex items-center bg-[#F5F2EA] px-5 py-3 rounded-2xl border border-[#EBE6DD] shadow-sm">
                    <i className="fa-solid fa-calendar-day text-[#8C8476] mr-3 text-lg"></i>
                    <input 
                      type="date" 
                      value={selectedAbsenceDate}
                      onChange={(e) => setSelectedAbsenceDate(e.target.value)}
                      className="bg-transparent text-base font-black text-[#4A4238] outline-none cursor-pointer"
                    />
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                  {absencesOnDate.length > 0 ? absencesOnDate.map((abs, idx) => (
                    <div key={idx} className="flex items-center p-6 rounded-2xl bg-[#FDFBF7] border border-[#EBE6DD] hover:shadow-lg transition-all">
                      <div className="w-14 h-14 rounded-full bg-[#EBE6DD] flex items-center justify-center font-black mr-6 shadow-sm text-xl">{abs.name?.charAt(0)}</div>
                      <div>
                        <p className="text-lg font-bold text-[#4A4238]">{abs.name}</p>
                        <p className="text-sm font-bold uppercase tracking-widest mt-0.5" style={{color: TEXT_COLORS[abs.type] || '#8C8476'}}>{abs.type}</p>
                      </div>
                    </div>
                  )) : (
                    <div className="col-span-full py-16 text-center text-lg font-bold text-[#D3C8B4] border border-dashed border-[#EBE6DD] rounded-2xl">
                      ไม่มีรายชื่อพนักงานที่ลาในวันที่เลือก
                    </div>
                  )}
                </div>
              </div>

              {/* Restored Monthly Summary Table */}
              <div id="this-month-leave-table" className="bg-white p-8 rounded-3xl shadow-sm border border-[#EBE6DD]">
                <h3 className="text-2xl font-bold text-[#4A4238] mb-10">สรุปพนักงานลาประจำเดือน</h3>
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse">
                    <thead className="bg-[#F5F2EA] text-[#8C8476] text-sm uppercase tracking-widest font-black">
                      <tr>
                        <th className="py-6 px-8 rounded-tl-2xl">พนักงาน</th>
                        <th className="py-6 px-8">วันที่ลา</th>
                        <th className="py-6 px-8">ประเภท</th>
                        <th className="py-6 px-8 rounded-tr-2xl">จำนวน</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-[#EBE6DD] text-lg">
                      {thisMonthLeaves.length > 0 ? thisMonthLeaves.map(leave => (
                        <tr key={leave.id} className="hover:bg-[#FDFBF7] transition-colors">
                          <td className="py-6 px-8 font-bold text-[#4A4238] text-lg">{leave.name}</td>
                          <td className="py-6 px-8 font-semibold text-[#8C8476] text-base">{leave.startDate}</td>
                          <td className="py-6 px-8">
                            <span className="inline-flex items-center px-4 py-1.5 rounded-full text-sm font-black shadow-sm" style={{backgroundColor: `${COLORS[leave.type] || '#EBE6DD'}44`, color: TEXT_COLORS[leave.type] || '#4A4238', border: `1px solid ${COLORS[leave.type] || '#D3C8B4'}88`}}>
                              {leave.type}
                            </span>
                          </td>
                          <td className="py-6 px-8 font-black text-[#4A4238] text-lg">{leave.days} <span className="text-xs font-bold text-[#8C8476]">วัน</span></td>
                        </tr>
                      )) : <tr><td colSpan="4" className="py-16 text-center text-lg font-bold text-[#D3C8B4]">ไม่มีข้อมูลการลาในเดือนนี้</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            <div className="space-y-10">
              <div className="bg-white p-8 rounded-3xl shadow-sm border border-[#EBE6DD]">
                <h3 className="text-2xl font-bold text-[#4A4238] mb-10">สัดส่วนประเภทการลา</h3>
                <div className="h-80">
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie data={pieData} cx="50%" cy="45%" innerRadius={80} outerRadius={110} paddingAngle={6} stroke="none" dataKey="value">
                        {pieData.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.fill} />)}
                      </Pie>
                      <RechartsTooltip contentStyle={{ borderRadius: '16px', fontWeight: 'bold', fontSize: '15px' }} />
                      <Legend verticalAlign="bottom" iconType="circle" wrapperStyle={{ paddingTop: '40px', fontSize: '15px', fontWeight: 'bold' }} />
                    </PieChart>
                  </ResponsiveContainer>
                </div>
              </div>

              <div className="bg-white p-8 rounded-3xl shadow-sm border border-[#EBE6DD]">
                <h3 className="text-2xl font-bold text-[#4A4238] mb-10">วันหยุดถัดไป</h3>
                <div className="space-y-6">
                  {upcomingHolidays.length > 0 ? upcomingHolidays.map((holiday, idx) => (
                    <div key={idx} className="flex items-center bg-[#FDFBF7] p-6 rounded-2xl border border-[#EBE6DD] shadow-sm">
                      <div className="w-16 h-16 bg-[#D3E4CD] text-[#22543D] rounded-xl flex items-center justify-center mr-6 font-black text-2xl shadow-sm">
                        {new Date(holiday.date).getDate()}
                      </div>
                      <div className="flex-1">
                        <p className="text-lg font-bold text-[#4A4238]">{holiday.name}</p>
                        <p className="text-sm font-bold text-[#8C8476]">{holiday.date}</p>
                      </div>
                    </div>
                  )) : <p className="text-center text-lg font-bold text-[#8C8476]">ไม่มีวันหยุดเร็วๆ นี้</p>}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function CalendarTab({ holidays, requests }) {
      const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1)); 
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const startDayOfWeek = new Date(year, month, 1).getDay();
      const monthNames = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

      const getEventsForDay = (day) => {
        const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
        const hols = holidays.filter(h => h.date === dateStr);
        const leaves = requests.filter(r => r.status === 'APPROVED' && r.startDate <= dateStr && r.endDate >= dateStr);
        return { hols, leaves };
      };

      return (
        <div className="bg-[#FDFBF7] rounded-[3.5rem] shadow-sm border border-[#EBE6DD] flex flex-col h-full overflow-hidden animate-in zoom-in-95 duration-500">
          <div className="px-12 py-10 border-b border-[#EBE6DD] flex justify-between items-center bg-white">
            <div className="flex items-center space-x-10">
              <button onClick={() => setCurrentDate(new Date(year, month - 1, 1))} className="w-14 h-14 flex items-center justify-center rounded-full bg-[#F5F2EA] text-[#4A4238] hover:bg-[#EBE6DD] shadow-sm transition-all text-xl"><i className="fa-solid fa-chevron-left"></i></button>
              <h2 className="text-4xl font-black text-[#4A4238] tracking-tight">{monthNames[month]} {year}</h2>
              <button onClick={() => setCurrentDate(new Date(year, month + 1, 1))} className="w-14 h-14 flex items-center justify-center rounded-full bg-[#F5F2EA] text-[#4A4238] hover:bg-[#EBE6DD] shadow-sm transition-all text-xl"><i className="fa-solid fa-chevron-right"></i></button>
            </div>
          </div>
          <div className="p-10 overflow-auto flex-1 no-scrollbar bg-[#FDFBF7]">
            <div className="grid grid-cols-7 gap-6 min-w-[1100px]">
              {['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'].map(day => <div key={day} className="text-center font-black text-[#8C8476] pb-6 text-sm tracking-[0.25em]">{day}</div>)}
              {Array.from({length: startDayOfWeek}).map((_, i) => <div key={`empty-${i}`} className="h-44 bg-[#F5F2EA]/50 rounded-[3rem] border border-dashed border-[#EBE6DD]"></div>)}
              {Array.from({length: daysInMonth}, (_, i) => i + 1).map(day => {
                const { hols, leaves } = getEventsForDay(day);
                return (
                  <div key={day} className="h-44 p-6 rounded-[3rem] border border-[#EBE6DD] bg-white hover:shadow-2xl transition-all group flex flex-col cursor-default">
                    <span className="text-xl font-black text-[#4A4238] block mb-4 group-hover:scale-110 origin-left transition-transform">{day}</span>
                    <div className="space-y-3 flex-1 overflow-y-auto no-scrollbar">
                      {hols.map((h, i) => <div key={`h-${i}`} className="text-sm bg-[#86D1B3] text-white px-4 py-2 rounded-full font-bold truncate shadow-sm border border-[#71B59B]">🎉 {h.name}</div>)}
                      {leaves.map((l, i) => <div key={`l-${i}`} className="text-sm px-4 py-2 rounded-full font-bold truncate border shadow-sm" style={{backgroundColor: COLORS[l.type] || '#EBE6DD', color: TEXT_COLORS[l.type] || '#4A4238', borderColor: `${COLORS[l.type] || '#EBE6DD'}cc`}}>{l.name}</div>)}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function EmployeesTab({ employees, balances }) {
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedEmployee, setSelectedEmployee] = useState(null);
      const filteredEmployees = employees.filter(emp => emp.name.toLowerCase().includes(searchTerm.toLowerCase()));

      return (
        <div className="bg-white rounded-[2.5rem] shadow-sm border border-[#EBE6DD] flex flex-col h-full overflow-hidden animate-in fade-in duration-500">
          <div className="p-10 border-b border-[#EBE6DD] bg-[#FDFBF7] flex justify-between items-center">
            <h2 className="text-3xl font-black text-[#4A4238]">จัดการข้อมูลพนักงาน</h2>
            <div className="relative">
              <i className="fa-solid fa-search absolute left-5 top-1/2 -translate-y-1/2 text-[#8C8476] text-xl"></i>
              <input type="text" placeholder="ค้นหาชื่อพนักงาน..." className="pl-14 pr-10 py-4 rounded-full border border-[#EBE6DD] text-lg font-bold focus:outline-none focus:ring-4 focus:ring-[#D3C8B4]/30 w-[450px] shadow-sm transition-all" onChange={e => setSearchTerm(e.target.value)} />
            </div>
          </div>
          <div className="overflow-x-auto flex-1">
            <table className="w-full text-left">
              <thead className="bg-[#F5F2EA] text-[#8C8476] text-sm font-black uppercase tracking-widest">
                <tr>
                  <th className="py-7 px-12">รายชื่อพนักงาน</th>
                  <th className="py-7 px-12 text-center">สัดส่วนการใช้สิทธิลา (%)</th>
                  <th className="py-7 px-12 text-center">วันลาพักร้อนคงเหลือ</th>
                  <th className="py-7 px-12 text-right">การจัดการ</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-[#EBE6DD] text-lg font-semibold">
                {filteredEmployees.map(emp => {
                  const empBalances = balances.filter(b => b.userId === emp.id);
                  const annual = empBalances.find(b => b.type === 'Annual');
                  const totalEntitled = empBalances.reduce((s, b) => s + b.entitled, 0);
                  const totalUsed = empBalances.reduce((s, b) => s + b.used, 0);
                  const usageRate = totalEntitled > 0 ? Math.round((totalUsed / totalEntitled) * 100) : 0;

                  return (
                    <tr key={emp.id} className="hover:bg-[#FDFBF7] transition-colors">
                      <td className="py-8 px-12 font-bold text-[#4A4238] text-xl">{emp.name}</td>
                      <td className="py-8 px-12">
                        <div className="flex items-center space-x-6 justify-center min-w-[250px]">
                          <span className="text-base font-black text-[#8C8476] w-12 text-right">{usageRate}%</span>
                          <div className="flex-1 bg-[#EBE6DD] h-3.5 rounded-full overflow-hidden max-w-[150px] shadow-inner">
                            <div className="h-full rounded-full transition-all duration-700 shadow-sm" style={{width: `${usageRate}%`, backgroundColor: usageRate > 80 ? '#F58D85' : usageRate > 40 ? '#F8C48B' : '#7EB1E0'}}></div>
                          </div>
                        </div>
                      </td>
                      <td className="py-8 px-12 text-center font-black text-3xl text-[#4A4238]">{annual?.remaining || 0} <span className="text-sm text-[#8C8476] font-bold">วัน</span></td>
                      <td className="py-8 px-12 text-right"><button onClick={() => setSelectedEmployee(emp)} className="px-10 py-4 bg-[#F5F2EA] text-[#4A4238] rounded-2xl text-base font-black hover:bg-[#EBE6DD] shadow-md transition-all">ดูรายละเอียด</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {selectedEmployee && (
            <div className="fixed inset-0 bg-[#4A4238]/70 backdrop-blur-lg z-50 flex items-center justify-center p-8 animate-in fade-in duration-300" onClick={() => setSelectedEmployee(null)}>
              <div className="bg-white rounded-[4.5rem] p-16 w-full max-w-4xl shadow-2xl border border-[#EBE6DD]" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-12"><h2 className="text-5xl font-black text-[#4A4238]">{selectedEmployee.name}</h2><button onClick={() => setSelectedEmployee(null)} className="w-16 h-16 bg-[#F5F2EA] rounded-full flex items-center justify-center text-[#4A4238] hover:rotate-90 transition-all text-2xl shadow-sm"><i className="fa-solid fa-xmark"></i></button></div>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-10">
                  {balances.filter(b => b.userId === selectedEmployee.id).map((b, i) => (
                    <div key={i} className="p-10 rounded-[3rem] border border-[#EBE6DD] bg-[#FDFBF7] shadow-sm hover:shadow-xl transition-all">
                      <p className="text-sm font-black text-[#8C8476] mb-4 uppercase tracking-[0.25em]">{b.type}</p>
                      <p className="text-5xl font-black text-[#4A4238]">{b.remaining} <span className="text-base text-[#8C8476] font-bold">วัน</span></p>
                      <div className="w-full bg-[#EBE6DD] h-3 rounded-full mt-8 overflow-hidden shadow-inner"><div className="h-full rounded-full transition-all duration-1000" style={{backgroundColor: COLORS[b.type] || '#8C8476', width: `${b.entitled > 0 ? (b.used/b.entitled)*100 : 0}%`}}></div></div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function ReportsTab({ employees, requests, balances }) {
      const usageStats = useMemo(() => {
        return employees.map(emp => {
          const empBalances = balances.filter(b => b.userId === emp.id);
          const totalEntitled = empBalances.reduce((s, b) => s + b.entitled, 0);
          const totalUsed = empBalances.reduce((s, b) => s + b.used, 0);
          return { name: emp.name, usageRate: totalEntitled > 0 ? Math.round((totalUsed / totalEntitled) * 100) : 0 };
        }).sort((a, b) => b.usageRate - a.usageRate);
      }, [employees, balances]);

      return (
        <div className="space-y-10 animate-in fade-in duration-500">
          <div className="bg-white rounded-[3.5rem] shadow-sm border border-[#EBE6DD] p-12">
            <h3 className="text-3xl font-black text-[#4A4238] mb-12">วิเคราะห์สัดส่วนการใช้สิทธิลา (Usage Breakdown)</h3>
            <div className="h-[600px]">
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={usageStats} layout="vertical" margin={{ left: 80, right: 60 }}>
                  <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#EBE6DD" />
                  <XAxis type="number" domain={[0, 100]} hide />
                  <YAxis dataKey="name" type="category" tick={{ fontSize: 16, fontWeight: 'bold', fill: '#4A4238' }} axisLine={false} tickLine={false} width={220} />
                  <RechartsTooltip cursor={{fill: 'transparent'}} contentStyle={{ borderRadius: '16px', fontWeight: 'bold', fontSize: '16px' }} />
                  <Bar dataKey="usageRate" fill="#8C8476" radius={[0, 20, 20, 0]} barSize={35} label={{ position: 'right', fontSize: 14, fontWeight: 'black', fill: '#8C8476', offset: 15, formatter: (v) => `${v}%` }} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState('overview');
      const [loading, setLoading] = useState(true);
      const [employees, setEmployees] = useState([]);
      const [balances, setBalances] = useState([]);
      const [requests, setRequests] = useState([]);
      const [holidays, setHolidays] = useState([]);

      const fetchData = async () => {
        try {
          const [ { data: empData }, { data: balData }, { data: reqData }, { data: holData } ] = await Promise.all([
            supabase.from('employees').select('*'),
            supabase.from('leave_balance').select('*'),
            supabase.from('leave_requests').select('*'),
            supabase.from('holidays').select('*')
          ]);

          setEmployees((empData || []).map(e => ({ id: e.user_id, name: e.full_name || e.displayname, nickname: e.nickname, department: e.company, status: e.active === 'Y' ? 'Active' : 'Inactive' })));
          setBalances((balData || []).map(b => ({ userId: b.user_id, type: b.leave_type, entitled: parseFloat(b.entitled) || 0, used: parseFloat(b.used) || 0, remaining: parseFloat(b.remaining) || 0 })));
          setRequests((reqData || []).map(r => ({ id: r.request_id, userId: r.user_id, name: r.name, type: r.leave_type, startDate: r.start_date, endDate: r.end_date, days: parseFloat(r.leave_days) || 0, reason: r.reason, status: r.status })));
          setHolidays((holData || []).map(h => ({ date: h.holiday_date || h.date, name: h.holiday_name || h.name })));
        } catch (error) { console.error("Error:", error); } 
        finally { setLoading(false); }
      };

      useEffect(() => {
        fetchData();
        const channel = supabase.channel('changes').on('postgres_changes', { event: '*', schema: 'public' }, fetchData).subscribe();
        return () => { supabase.removeChannel(channel); };
      }, []);

      const stats = useMemo(() => {
        const today = new Date().toLocaleDateString('en-CA');
        const pending = requests.filter(r => r.status === 'PENDING' || r.status === 'SUBMITTED').length;
        const totalApprovedDays = requests.filter(r => r.status === 'APPROVED').reduce((sum, r) => sum + r.days, 0);
        const avgDays = employees.length > 0 ? (totalApprovedDays / employees.length).toFixed(1) : 0;
        const totalEntitled = balances.reduce((s, b) => s + b.entitled, 0);
        const totalUsed = balances.reduce((s, b) => s + b.used, 0);
        const usageRate = totalEntitled > 0 ? Math.round((totalUsed / totalEntitled) * 100) : 0;
        
        const typeCount = {};
        requests.filter(r => r.status === 'APPROVED').forEach(r => { typeCount[r.type] = (typeCount[r.type] || 0) + 1; });
        const mostFrequent = Object.keys(typeCount).length > 0 ? Object.keys(typeCount).reduce((a, b) => typeCount[a] > typeCount[b] ? a : b) : '-';

        return { pending, avgDays, mostFrequent, usageRate };
      }, [requests, employees, balances]);

      if (loading) return <div className="flex h-screen items-center justify-center bg-[#F5F2EA] text-4xl font-black text-[#8C8476] animate-pulse italic tracking-tighter">กำลังดึงข้อมูล...</div>;

      return (
        <div className="flex h-screen bg-[#F5F2EA] font-sans selection:bg-[#D3E4CD] selection:text-[#3A4D39]">
          <aside className="bg-[#FDFBF7] w-[320px] border-r border-[#EBE6DD] hidden md:flex flex-col shadow-lg z-20">
            <div className="h-32 flex items-center px-12 border-b border-[#EBE6DD] bg-white"><div className="w-14 h-14 bg-[#A8E6CF] rounded-[1.5rem] flex items-center justify-center mr-5 shadow-md text-2xl"><i className="fa-solid fa-leaf text-[#22543D]"></i></div><span className="text-4xl font-black text-[#4A4238] tracking-tighter">LeaveApp</span></div>
            <nav className="flex-1 p-10 space-y-6">
              <NavItem icon={<i className="fa-solid fa-chart-pie"></i>} label="ภาพรวม" active={activeTab === 'overview'} onClick={() => setActiveTab('overview')} />
              <NavItem icon={<i className="fa-solid fa-clock-rotate-left"></i>} label="รออนุมัติ" active={activeTab === 'pending'} onClick={() => setActiveTab('pending')} badge={stats.pending} />
              <NavItem icon={<i className="fa-solid fa-calendar"></i>} label="ปฏิทินการลา" active={activeTab === 'calendar'} onClick={() => setActiveTab('calendar')} />
              <NavItem icon={<i className="fa-solid fa-users"></i>} label="จัดการพนักงาน" active={activeTab === 'employees'} onClick={() => setActiveTab('employees')} />
              <NavItem icon={<i className="fa-solid fa-table"></i>} label="รายงานสรุป" active={activeTab === 'reports'} onClick={() => setActiveTab('reports')} />
            </nav>
          </aside>
          <div className="flex-1 flex flex-col overflow-hidden relative">
            <header className="h-32 bg-[#FDFBF7] border-b border-[#EBE6DD] flex items-center px-14 shadow-md z-10">
              <h1 className="text-5xl font-black text-[#4A4238] tracking-tighter capitalize">
                {activeTab === 'overview' ? 'ภาพรวมระบบ' : 
                 activeTab === 'pending' ? 'รายการรออนุมัติ' : 
                 activeTab === 'calendar' ? 'ปฏิทินการลา' : 
                 activeTab === 'employees' ? 'จัดการข้อมูลพนักงาน' : 
                 'รายงานวิเคราะห์ผล'}
              </h1>
            </header>
            <main className="flex-1 overflow-auto p-14 bg-[#F5F2EA] no-scrollbar">
              {activeTab === 'overview' && <OverviewTab stats={stats} employees={employees} requests={requests} holidays={holidays} onNavigate={setActiveTab} />}
              {activeTab === 'pending' && <PendingTab requests={requests} />}
              {activeTab === 'calendar' && <CalendarTab holidays={holidays} requests={requests} />}
              {activeTab === 'employees' && <EmployeesTab employees={employees} balances={balances} />}
              {activeTab === 'reports' && <ReportsTab employees={employees} requests={requests} balances={balances} />}
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
