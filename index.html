<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave Dashboard System</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Prompt', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>body { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="bg-[#F5F2EA] text-[#4A4238]">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, PieChart, Pie, Cell, ResponsiveContainer } = window.Recharts;
    const { createClient } = window.supabase;

    const SUPABASE_URL = 'https://kmmeeqinzfgtoilrabir.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttbWVlcWluemZndG9pbHJhYmlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Njg2MTcsImV4cCI6MjA4ODI0NDYxN30.zrccfQOVFQof1jMj1TRbPiIYYukcnYYBqi3i1x6qir0';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const COLORS = { 'Annual': '#7EB1E0', 'Sick': '#F58D85', 'Personal': '#F8C48B', 'Other': '#C5B1D4' };

    function App() {
      const [activeTab, setActiveTab] = useState('overview');
      const [loading, setLoading] = useState(true);
      const [employees, setEmployees] = useState([]);
      const [balances, setBalances] = useState([]);
      const [requests, setRequests] = useState([]);
      const [holidays, setHolidays] = useState([]);

      const fetchData = async () => {
        try {
          const [ { data: emp }, { data: bal }, { data: req }, { data: hol } ] = await Promise.all([
            supabase.from('employees').select('*'),
            supabase.from('leave_balance').select('*'),
            supabase.from('leave_requests').select('*'),
            supabase.from('holidays').select('*')
          ]);
          setEmployees(emp.map(e => ({ id: e.user_id, name: e.full_name || e.displayname, nickname: e.nickname, dept: e.company })));
          setBalances(bal.map(b => ({ userId: b.user_id, type: b.leave_type, remaining: b.remaining, entitled: b.entitled, used: b.used })));
          setRequests(req.map(r => ({ id: r.request_id, userId: r.user_id, name: r.name, type: r.leave_type, startDate: r.start_date, endDate: r.end_date, days: r.leave_days, status: r.status })));
          setHolidays(hol.map(h => ({ date: h.holiday_date, name: h.holiday_name })));
        } catch (e) { console.error(e); } finally { setLoading(false); }
      };

      useEffect(() => {
        fetchData();
        const sub = supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, fetchData).subscribe();
        return () => supabase.removeChannel(sub);
      }, []);

      if (loading) return <div className="h-screen flex items-center justify-center font-bold">กำลังเชื่อมต่อข้อมูล...</div>;

      return (
        <div className="flex h-screen overflow-hidden">
          <aside class="w-64 bg-white border-r p-6 space-y-4">
            <h1 class="text-2xl font-black mb-8">LeaveApp</h1>
            <button onClick={() => setActiveTab('overview')} class={`w-full text-left p-3 rounded-xl font-bold ${activeTab==='overview'?'bg-[#F5F2EA]':''}`}>ภาพรวม</button>
            <button onClick={() => setActiveTab('employees')} class={`w-full text-left p-3 rounded-xl font-bold ${activeTab==='employees'?'bg-[#F5F2EA]':''}`}>พนักงาน</button>
          </aside>
          <main class="flex-1 p-10 overflow-auto">
            <h2 class="text-3xl font-black mb-8 capitalize">{activeTab}</h2>
            {activeTab === 'overview' && (
              <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border">
                  <h3 class="font-bold mb-4">พนักงานทั้งหมด: {employees.length} คน</h3>
                  <h3 class="font-bold">คำขอลาวันนี้: {requests.filter(r => r.status === 'APPROVED' && r.startDate === new Date().toISOString().split('T')[0]).length} รายการ</h3>
                </div>
              </div>
            )}
            {activeTab === 'employees' && (
              <div class="bg-white rounded-[2rem] border overflow-hidden">
                <table class="w-full text-left">
                  <thead class="bg-[#F5F2EA] font-bold">
                    <tr><th class="p-5">ชื่อ-นามสกุล</th><th class="p-5">แผนก</th><th class="p-5 text-right">ดำเนินการ</th></tr>
                  </thead>
                  <tbody>
                    {employees.map(e => (
                      <tr key={e.id} class="border-t">
                        <td class="p-5 font-bold">{e.name}</td>
                        <td class="p-5">{e.dept}</td>
                        <td class="p-5 text-right"><button class="bg-[#F5F2EA] px-4 py-2 rounded-lg text-xs font-bold">ดูข้อมูล</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
